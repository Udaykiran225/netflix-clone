<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Netflix Player</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black flex items-center justify-center min-h-screen">

  <!-- Video Player -->
  <video
    controls
    autoplay
    muted
  
    class="w-full h-screen object-contain"
  >

    <source
      src="assets/videos/strangerthings.mp4"
      type="video/mp4"
    >

  </video>

</body>

</html>
