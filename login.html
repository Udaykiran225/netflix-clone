<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Netflix Login</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <link rel="stylesheet" href="css/login.css">

</head>
<div id="recaptcha-container"></div>

<body class="bg-black text-white">

  <div class="login-container">

    <h1 class="text-4xl font-bold mb-8">
      Sign In
    </h1>

    <!-- Email Login -->
    <input
      type="email"
      id="email"
      placeholder="Email"
      class="w-full p-3 mb-4 bg-gray-800 rounded"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
      class="w-full p-3 mb-4 bg-gray-800 rounded"
    >

    <button
      onclick="loginEmail()"
      class="w-full bg-red-600 py-3 rounded font-bold"
    >
      Sign In
    </button>

    <!-- Divider -->
    <div class="text-center my-4 text-gray-400">
      OR
    </div>
    <button
  onclick="registerEmail()"
  class="w-full bg-gray-700 py-3 rounded font-bold mt-3"
>
  Create Account
</button>

    <!-- Google Login -->
    <button
      onclick="googleLogin()"
      class="w-full bg-white text-black py-3 rounded font-bold"
    >
      Continue with Google
    </button>

    <!-- Phone Login -->
    <div class="mt-6">
    </div>

  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>

</body>

</html>
